<!doctype html>
<html lang="pt-BR" data-theme="aco-solar" data-mode="light" data-context="fantasia">
  <head>
    <meta charset="UTF-8" />
    <!-- #237: pinch-zoom desligado — o app é a UI inteira e o zoom quebrava o manuseio -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Pleitost</title>
    <!-- Primer de tema pré-paint (evita FOUC): aplica data-theme e a cor
         personalizada ANTES do React montar, lendo `pleitost.theme` (mesma fonte
         do theme.ts, com migração da chave/shape antigos). Presets nomeados de
         destaque aplicam no mount (flash desprezível). Espelho de applyDom. -->
    <script>
      ;(function () {
        try {
          var raw = localStorage.getItem('pleitost.theme') || localStorage.getItem('pleitost-theme')
          if (!raw) return
          var t = JSON.parse(raw)
          var el = document.documentElement
          var THEMES = ['aco-solar', 'ferro-frio', 'safira', 'rubi', 'ambar', 'esmeralda']
          var DARK_DEFAULT = { 'ferro-frio': 1, safira: 1, rubi: 1, esmeralda: 1 }
          var legacyCyber = t.theme === 'cyberpunk' || t.aesthetic === 'cyberpunk'
          var theme = THEMES.indexOf(t.theme) >= 0 ? t.theme : legacyCyber ? 'ferro-frio' : 'aco-solar'
          el.dataset.theme = theme
          el.dataset.mode = t.mode === 'dark' || t.mode === 'light' ? t.mode : DARK_DEFAULT[theme] ? 'dark' : 'light'
          el.dataset.context = t.context === 'cyberpunk' || legacyCyber ? 'cyberpunk' : 'fantasia'
          if (t.accent === 'custom' && typeof t.customAccent === 'string' && /^#[0-9a-fA-F]{3,8}$/.test(t.customAccent)) {
            el.style.setProperty('--accent', t.customAccent)
            el.style.setProperty('--sb', 'color-mix(in srgb, ' + t.customAccent + ' 30%, transparent)')
          }
        } catch (e) {
          /* storage indisponível / json ruim → defaults do HTML */
        }
      })()
    </script>
    <!-- fontes do design (Companion App.dc.html) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Share+Tech+Mono&family=Cinzel:wght@400;500;600;700&family=Spectral:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
